services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: vpn_gateway
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080 # qBit Web UI
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS}
      - WIREGUARD_MTU=1420 
      - VPN_INPUT_PORTS=6881 
      - HEALTH_RESTART_VPN=on
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - HEALTH_TARGET_ADDRESSES=cloudflare.com:443,github.com:443
      - DNS_ADDRESS=1.1.1.1
      - DOT=off
      - DNS_KEEP_NAMESERVERS=on
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - infra

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: always
    network_mode: "service:gluetun" # Routes all qbit traffic through the VPN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - /mnt/storage/downloads:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # This ensures qbit restarts if gluetun is updated
      - "com.centurylinklabs.watchtower.depends-on=gluetun"

  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: samba
    restart: always
    ports:
      - "445:445"
    healthcheck:
      test: ["CMD-SHELL", "smbclient -L \\\\localhost -U % -m SMB3"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    environment:
      WSDD2_ENABLE: "no"
      AVAHI_DISABLE: "yes"
      ACCOUNT_radxa: ${SAMBA_PASSWORD}
    volumes:
      - /mnt/storage/downloads:/media:rslave
      - ./smb.conf:/etc/samba/smb.conf

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    user: "0:0"  # This tells the container to use its internal root
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - homelab_net

networks:
  infra:
    external: true
  homelab_net:
    driver: bridge
